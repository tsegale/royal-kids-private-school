<svg viewBox="0 0 480 552" xmlns="http://www.w3.org/2000/svg">
  <rect width="480" height="552" fill="#e7ede7"/>
  <!-- ground -->
  <rect y="430" width="480" height="122" fill="#dcd6c2"/>
  <!-- distant tree line -->
  <g fill="#1f4734" opacity="0.18">
    <circle cx="50" cy="420" r="50"/>
    <circle cx="115" cy="436" r="64"/>
    <circle cx="400" cy="430" r="58"/>
    <circle cx="452" cy="414" r="42"/>
  </g>
  <!-- main building block -->
  <rect x="55" y="210" width="370" height="225" fill="#ffffff" stroke="#1b231d" stroke-width="2.5"/>
  <!-- pediment / roof -->
  <path d="M30 210 L240 110 L450 210 Z" fill="#1f4734" stroke="#1b231d" stroke-width="2.5"/>
  <rect x="223" y="78" width="34" height="38" fill="#1f4734" stroke="#1b231d" stroke-width="2.5"/>
  <!-- central pillared entrance -->
  <rect x="190" y="290" width="100" height="145" fill="#e7ede7" stroke="#1b231d" stroke-width="2.5"/>
  <rect x="207" y="308" width="15" height="127" fill="#ffffff" stroke="#1b231d" stroke-width="1.6"/>
  <rect x="232" y="308" width="15" height="127" fill="#ffffff" stroke="#1b231d" stroke-width="1.6"/>
  <rect x="257" y="308" width="15" height="127" fill="#ffffff" stroke="#1b231d" stroke-width="1.6"/>
  <path d="M184 292 L240 254 L296 292 Z" fill="#b08d3f" stroke="#1b231d" stroke-width="1.8"/>
  <!-- door -->
  <rect x="222" y="378" width="36" height="57" fill="#5c2230" stroke="#1b231d" stroke-width="1.8"/>
  <!-- windows left wing -->
  <g fill="#dfe6df" stroke="#1b231d" stroke-width="1.6">
    <rect x="78" y="250" width="38" height="52"/>
    <rect x="128" y="250" width="38" height="52"/>
    <rect x="78" y="330" width="38" height="52"/>
    <rect x="128" y="330" width="38" height="52"/>
  </g>
  <!-- windows right wing -->
  <g fill="#dfe6df" stroke="#1b231d" stroke-width="1.6">
    <rect x="314" y="250" width="38" height="52"/>
    <rect x="364" y="250" width="38" height="52"/>
    <rect x="314" y="330" width="38" height="52"/>
    <rect x="364" y="330" width="38" height="52"/>
  </g>
  <!-- flag pole and flag -->
  <line x1="240" y1="78" x2="240" y2="20" stroke="#1b231d" stroke-width="2.5"/>
  <path d="M240 23 L290 34 L240 46 Z" fill="#b08d3f" stroke="#1b231d" stroke-width="1.6"/>
  <!-- low hedge along the path -->
  <rect x="55" y="432" width="370" height="13" fill="#1f4734" opacity="0.55"/>
  <!-- foreground figures, simple silhouettes, walking to school -->
  <g fill="#1f4734">
    <circle cx="130" cy="480" r="11"/>
    <rect x="121" y="491" width="18" height="38" rx="4"/>
  </g>
  <g fill="#7a3242">
    <circle cx="168" cy="486" r="9"/>
    <rect x="160" y="496" width="16" height="32" rx="4"/>
  </g>
  <g fill="#5c2230">
    <circle cx="340" cy="482" r="10"/>
    <rect x="331" y="493" width="18" height="36" rx="4"/>
  </g>
  <g fill="#1f4734">
    <circle cx="375" cy="488" r="9"/>
    <rect x="367" y="498" width="16" height="32" rx="4"/>
  </g>
</svg>
