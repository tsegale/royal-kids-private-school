<svg viewBox="0 0 600 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="630" fill="#f1f0e7"/>
  <rect width="600" height="360" fill="#ffffff"/>
  <!-- foreground floor, drawn before furniture and figures -->
  <rect y="360" width="600" height="270" fill="#dcd6c2"/>
  <rect x="120" y="490" width="360" height="100" fill="#1f4734" opacity="0.14"/>
  <rect x="120" y="490" width="360" height="100" fill="none" stroke="#b08d3f" stroke-width="2" opacity="0.5"/>
  <!-- chalkboard -->
  <rect x="50" y="60" width="250" height="160" fill="#1f4734" stroke="#1b231d" stroke-width="2"/>
  <rect x="50" y="60" width="250" height="160" fill="none" stroke="#b08d3f" stroke-width="3"/>
  <g stroke="#f1f0e7" stroke-width="2.6" stroke-linecap="round" opacity="0.9">
    <line x1="74" y1="98" x2="190" y2="98"/>
    <line x1="74" y1="122" x2="160" y2="122"/>
    <line x1="74" y1="146" x2="210" y2="146"/>
    <line x1="74" y1="170" x2="140" y2="170"/>
  </g>
  <!-- window -->
  <rect x="340" y="50" width="220" height="170" fill="#e7ede7" stroke="#1b231d" stroke-width="2"/>
  <line x1="450" y1="50" x2="450" y2="220" stroke="#1b231d" stroke-width="2"/>
  <line x1="340" y1="135" x2="560" y2="135" stroke="#1b231d" stroke-width="2"/>
  <!-- a tree visible through the window -->
  <circle cx="500" cy="100" r="26" fill="#1f4734" opacity="0.35"/>
  <rect x="496" y="120" width="8" height="20" fill="#8d6b2c" opacity="0.4"/>
  <!-- desks row -->
  <rect x="50" y="290" width="130" height="16" fill="#b08d3f" stroke="#1b231d" stroke-width="1.6"/>
  <rect x="62" y="306" width="9" height="44" fill="#8d6b2c"/>
  <rect x="160" y="306" width="9" height="44" fill="#8d6b2c"/>
  <rect x="235" y="290" width="130" height="16" fill="#b08d3f" stroke="#1b231d" stroke-width="1.6"/>
  <rect x="247" y="306" width="9" height="44" fill="#8d6b2c"/>
  <rect x="345" y="306" width="9" height="44" fill="#8d6b2c"/>
  <rect x="420" y="290" width="130" height="16" fill="#b08d3f" stroke="#1b231d" stroke-width="1.6"/>
  <rect x="432" y="306" width="9" height="44" fill="#8d6b2c"/>
  <rect x="530" y="306" width="9" height="44" fill="#8d6b2c"/>
  <!-- seated students, drawn after the floor so they remain visible -->
  <g><circle cx="80" cy="378" r="18" fill="#1f4734"/><rect x="56" y="396" width="48" height="58" rx="9" fill="#5c2230"/></g>
  <g><circle cx="175" cy="378" r="18" fill="#7a3242"/><rect x="151" y="396" width="48" height="58" rx="9" fill="#1f4734"/></g>
  <g><circle cx="265" cy="378" r="18" fill="#1f4734"/><rect x="241" y="396" width="48" height="58" rx="9" fill="#b08d3f"/></g>
  <g><circle cx="360" cy="378" r="18" fill="#8d6b2c"/><rect x="336" y="396" width="48" height="58" rx="9" fill="#2a5942"/></g>
  <g><circle cx="450" cy="378" r="18" fill="#5c2230"/><rect x="426" y="396" width="48" height="58" rx="9" fill="#1f4734"/></g>
  <g><circle cx="540" cy="378" r="18" fill="#1f4734"/><rect x="516" y="396" width="48" height="58" rx="9" fill="#7a3242"/></g>
  <line x1="0" y1="600" x2="600" y2="600" stroke="#d8d3c2" stroke-width="1.4"/>
</svg>
