<svg viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="460" fill="#e7ede7"/>
  <rect y="280" width="700" height="180" fill="#cfe0c8"/>
  <!-- field lines -->
  <rect x="60" y="300" width="580" height="140" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.8"/>
  <line x1="350" y1="300" x2="350" y2="440" stroke="#ffffff" stroke-width="3" opacity="0.8"/>
  <circle cx="350" cy="370" r="36" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.8"/>
  <!-- goal posts -->
  <rect x="60" y="330" width="8" height="80" fill="#1b231d"/>
  <rect x="632" y="330" width="8" height="80" fill="#1b231d"/>
  <!-- running children figures -->
  <g fill="#5c2230"><circle cx="180" cy="350" r="14"/><rect x="163" y="364" width="34" height="42" rx="8"/></g>
  <g fill="#1f4734"><circle cx="250" cy="365" r="13"/><rect x="234" y="378" width="32" height="40" rx="8"/></g>
  <g fill="#7a3242"><circle cx="430" cy="360" r="13"/><rect x="414" y="373" width="32" height="40" rx="8"/></g>
  <g fill="#b08d3f"><circle cx="500" cy="345" r="14"/><rect x="483" y="359" width="34" height="42" rx="8"/></g>
  <!-- ball -->
  <circle cx="330" cy="410" r="11" fill="none" stroke="#1b231d" stroke-width="2.4"/>
  <!-- sideline trees -->
  <circle cx="40" cy="250" r="34" fill="#1f4734" opacity="0.7"/>
  <rect x="34" y="280" width="10" height="24" fill="#5c4118"/>
  <circle cx="660" cy="240" r="38" fill="#2a5942" opacity="0.7"/>
  <rect x="654" y="274" width="10" height="26" fill="#5c4118"/>
</svg>
