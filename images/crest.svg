<!--
  ROYAL KIDS PRIVATE SCHOOL CREST
  A restrained shield mark: open book + rising sun motif,
  bound by a simple laurel-free border. No gradients, no
  photographic textures, just clean line work in the brand
  palette, in the spirit of a printed letterhead crest.
-->
<svg viewBox="0 0 100 116" xmlns="http://www.w3.org/2000/svg">
  <path d="M50 2 L94 16 V58 C94 88 74 104 50 114 C26 104 6 88 6 58 V16 Z"
        fill="#1f4734" stroke="#b08d3f" stroke-width="2"/>
  <path d="M50 8 L88 20 V58 C88 84 70 99 50 108 C30 99 12 84 12 58 V20 Z"
        fill="none" stroke="#f1f0e7" stroke-width="1" opacity="0.5"/>
  <!-- open book -->
  <g transform="translate(50 60)">
    <path d="M-26 -6 C-18 -12 -8 -10 0 -6 C8 -10 18 -12 26 -6 L26 14 C18 9 8 8 0 12 C-8 8 -18 9 -26 14 Z"
          fill="#f1f0e7" stroke="#b08d3f" stroke-width="1.4"/>
    <line x1="0" y1="-6" x2="0" y2="12" stroke="#b08d3f" stroke-width="1.2"/>
    <line x1="-19" y1="-3" x2="-7" y2="-1" stroke="#1f4734" stroke-width="1"/>
    <line x1="-19" y1="3" x2="-7" y2="5" stroke="#1f4734" stroke-width="1"/>
    <line x1="19" y1="-3" x2="7" y2="-1" stroke="#1f4734" stroke-width="1"/>
    <line x1="19" y1="3" x2="7" y2="5" stroke="#1f4734" stroke-width="1"/>
  </g>
  <!-- rising sun rays above the book -->
  <g stroke="#b08d3f" stroke-width="1.6" stroke-linecap="round">
    <line x1="50" y1="24" x2="50" y2="33"/>
    <line x1="38" y1="28" x2="44" y2="35"/>
    <line x1="62" y1="28" x2="56" y2="35"/>
  </g>
  <circle cx="50" cy="40" r="5.5" fill="none" stroke="#b08d3f" stroke-width="1.6"/>
  <!-- banner ribbon -->
  <path d="M28 92 L50 100 L72 92" fill="none" stroke="#f1f0e7" stroke-width="1.3" opacity="0.65"/>
</svg>
