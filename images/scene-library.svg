  <rect x="180" y="336" width="10" height="60" fill="#5c4118"/>
  <rect x="510" y="336" width="10" height="60" fill="#5c4118"/>
  <!-- open books on table -->
  <path d="M210 320 L250 314 L290 320 L290 330 L250 324 L210 330 Z" fill="#ffffff" stroke="#1b231d" stroke-width="1.2"/>
  <path d="M400 320 L440 314 L480 320 L480 330 L440 324 L400 330 Z" fill="#ffffff" stroke="#1b231d" stroke-width="1.2"/>
  <!-- seated readers -->
  <g>
    <circle cx="250" cy="365" r="15" fill="#861C2A"/>
    <rect x="231" y="380" width="38" height="48" rx="8" fill="#521220"/>
